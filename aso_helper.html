<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASO Helper</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0f11;
    --bg2: #161719;
    --bg3: #1e2023;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8e9eb;
    --text2: #888c94;
    --text3: #555960;
    --accent: #4ade80;
    --accent2: #22c55e;
    --accent-dim: rgba(74,222,128,0.1);
    --accent-dim2: rgba(74,222,128,0.06);
    --blue: #60a5fa;
    --blue-dim: rgba(96,165,250,0.1);
    --amber: #fbbf24;
    --amber-dim: rgba(251,191,36,0.1);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.1);
    --radius: 10px;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 20px 60px;
    max-width: 820px;
    margin: 0 auto;
  }

  /* Header */
  .header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 32px;
  }
  .logo {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  .logo-sub {
    font-size: 12px;
    color: var(--text3);
    font-family: var(--mono);
  }

  /* Search */
  .search-row {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
  }
  .search-input {
    flex: 1;
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input::placeholder { color: var(--text3); }
  .search-input:focus { border-color: var(--accent); }

  .btn {
    background: var(--accent);
    color: #0a1a0e;
    border: none;
    border-radius: var(--radius);
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    padding: 10px 18px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .btn:hover { opacity: 0.88; }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  .btn-ghost {
    background: transparent;
    color: var(--text2);
    border: 0.5px solid var(--border2);
  }
  .btn-ghost:hover { border-color: var(--border); color: var(--text); opacity: 1; }

  /* Country selector */
  .country-row {
    display: flex;
    gap: 6px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .cc-btn {
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 6px;
    border: 0.5px solid var(--border);
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    transition: all 0.12s;
  }
  .cc-btn:hover { color: var(--text2); border-color: var(--border2); }
  .cc-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  /* App card */
  .app-card {
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 16px;
    display: flex;
    gap: 16px;
    align-items: flex-start;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .app-card:hover { border-color: rgba(255,255,255,0.2); background: var(--bg3); }
  .app-card.selected { border-color: var(--accent); background: var(--accent-dim2); }

  .app-icon {
    width: 56px;
    height: 56px;
    border-radius: 12px;
    flex-shrink: 0;
    object-fit: cover;
    background: var(--bg3);
  }

  .app-info { flex: 1; min-width: 0; }
  .app-name { font-size: 15px; font-weight: 500; margin-bottom: 3px; color: var(--text); }
  .app-dev { font-size: 12px; color: var(--text2); margin-bottom: 6px; font-family: var(--mono); }
  .app-tags { display: flex; gap: 6px; flex-wrap: wrap; }

  .tag {
    font-size: 11px;
    font-family: var(--mono);
    padding: 2px 8px;
    border-radius: 5px;
    border: 0.5px solid var(--border);
    color: var(--text2);
    background: var(--bg3);
  }
  .tag.green { border-color: rgba(74,222,128,0.3); color: var(--accent); background: var(--accent-dim); }
  .tag.blue { border-color: rgba(96,165,250,0.3); color: var(--blue); background: var(--blue-dim); }
  .tag.amber { border-color: rgba(251,191,36,0.3); color: var(--amber); background: var(--amber-dim); }

  .rating-row { display: flex; align-items: center; gap: 5px; }
  .stars { color: var(--amber); font-size: 12px; letter-spacing: 1px; }
  .rating-num { font-family: var(--mono); font-size: 12px; color: var(--text2); }

  /* Section */
  .section {
    margin-top: 24px;
    border: 0.5px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  .section-header {
    padding: 12px 18px;
    background: var(--bg2);
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .section-title {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .section-body { padding: 18px; background: var(--bg); }

  /* Metrics grid */
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
  }
  .metric-card {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
  }
  .metric-label { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-bottom: 5px; }
  .metric-value { font-size: 20px; font-weight: 500; color: var(--text); line-height: 1; }
  .metric-value.accent { color: var(--accent); }
  .metric-value.blue { color: var(--blue); }
  .metric-value.amber { color: var(--amber); }
  .metric-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }

  /* Keywords */
  .keywords-wrap { display: flex; flex-wrap: wrap; gap: 7px; }
  .kw {
    font-family: var(--mono);
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 6px;
    border: 0.5px solid var(--border2);
    color: var(--text2);
    background: var(--bg2);
  }
  .kw.high { border-color: rgba(74,222,128,0.4); color: var(--accent); background: var(--accent-dim); font-weight: 500; }
  .kw.mid { border-color: rgba(96,165,250,0.3); color: var(--blue); background: var(--blue-dim); }

  /* Analysis output */
  .analysis-block {
    font-size: 13px;
    line-height: 1.75;
    color: var(--text2);
    white-space: pre-wrap;
  }
  .analysis-block strong { color: var(--text); font-weight: 500; }

  /* Score bar */
  .score-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .score-label { font-size: 12px; color: var(--text2); width: 140px; flex-shrink: 0; font-family: var(--mono); }
  .score-bar-wrap { flex: 1; height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .score-bar { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
  .score-num { font-family: var(--mono); font-size: 11px; color: var(--text3); width: 30px; text-align: right; }

  /* Status */
  .status { font-family: var(--mono); font-size: 12px; color: var(--text3); margin: 16px 0; text-align: center; }
  .status .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-right: 6px; animation: blink 1s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  .empty { text-align: center; padding: 40px; color: var(--text3); font-size: 13px; font-family: var(--mono); }

  /* Divider */
  hr { border: none; border-top: 0.5px solid var(--border); margin: 14px 0; }

  /* Description */
  .desc-text {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.7;
    max-height: 120px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
  }
  .desc-text.expanded { max-height: none; }
  .desc-text::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 40px;
    background: linear-gradient(transparent, var(--bg));
    pointer-events: none;
  }
  .desc-text.expanded::after { display: none; }
</style>
</head>
<body>

<div class="header">
  <span class="logo">aso_helper</span>
  <span class="logo-sub">// App Store edition</span>
</div>

<div class="search-row">
  <input class="search-input" id="query" type="text" placeholder="Название приложения... (напр. Duolingo, Notion, TikTok)" />
  <button class="btn" id="searchBtn" onclick="searchApps()">Найти</button>
</div>

<div class="country-row" id="countryRow"></div>

<div id="results"></div>
<div id="analysis"></div>

<script>
const COUNTRIES = [
  { code: 'ru', label: 'RU' },
  { code: 'kz', label: 'KZ' },
  { code: 'us', label: 'US' },
  { code: 'gb', label: 'GB' },
  { code: 'de', label: 'DE' },
  { code: 'fr', label: 'FR' },
  { code: 'tr', label: 'TR' },
];

let selectedCountry = 'kz';
let selectedApp = null;

// Build country buttons
const ccRow = document.getElementById('countryRow');
COUNTRIES.forEach(c => {
  const b = document.createElement('button');
  b.className = 'cc-btn' + (c.code === selectedCountry ? ' active' : '');
  b.textContent = c.label;
  b.onclick = () => {
    selectedCountry = c.code;
    document.querySelectorAll('.cc-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
  };
  ccRow.appendChild(b);
});

document.getElementById('query').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchApps();
});

async function searchApps() {
  const q = document.getElementById('query').value.trim();
  if (!q) return;
  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  btn.textContent = '...';

  document.getElementById('results').innerHTML = `<div class="status"><span class="dot"></span>Поиск в App Store (${selectedCountry.toUpperCase()})...</div>`;
  document.getElementById('analysis').innerHTML = '';
  selectedApp = null;

  try {
    const url = `https://itunes.apple.com/search?term=${encodeURIComponent(q)}&country=${selectedCountry}&entity=software&limit=6&lang=ru_ru`;
    const res = await fetch(url);
    const data = await res.json();
    renderResults(data.results || []);
  } catch (e) {
    document.getElementById('results').innerHTML = `<div class="status">Ошибка: ${e.message}</div>`;
  }

  btn.disabled = false;
  btn.textContent = 'Найти';
}

function renderResults(apps) {
  const el = document.getElementById('results');
  if (!apps.length) { el.innerHTML = '<div class="empty">Ничего не найдено</div>'; return; }

  el.innerHTML = apps.map((app, i) => {
    const rating = app.averageUserRating ? app.averageUserRating.toFixed(1) : '—';
    const reviews = app.userRatingCount ? formatNum(app.userRatingCount) : '—';
    const stars = app.averageUserRating ? renderStars(app.averageUserRating) : '';
    const price = app.price === 0 ? 'Бесплатно' : `${app.price} ${app.currency}`;
    const size = app.fileSizeBytes ? (app.fileSizeBytes / 1048576).toFixed(0) + ' MB' : '';

    return `
    <div class="app-card" id="appcard-${i}" onclick="selectApp(${i})">
      <img class="app-icon" src="${app.artworkUrl100}" alt="" loading="lazy" />
      <div class="app-info">
        <div class="app-name">${esc(app.trackName)}</div>
        <div class="app-dev">${esc(app.artistName)}</div>
        <div class="rating-row" style="margin-bottom:6px">
          <span class="stars">${stars}</span>
          <span class="rating-num">${rating} · ${reviews} отзывов</span>
        </div>
        <div class="app-tags">
          <span class="tag blue">${esc(app.primaryGenreName || '')}</span>
          <span class="tag ${app.price === 0 ? 'green' : 'amber'}">${price}</span>
          ${size ? `<span class="tag">${size}</span>` : ''}
          <span class="tag">${app.contentAdvisoryRating || ''}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  // store apps globally
  window._apps = apps;
}

function selectApp(i) {
  document.querySelectorAll('.app-card').forEach((c, j) => {
    c.classList.toggle('selected', j === i);
  });
  selectedApp = window._apps[i];
  runAnalysis(selectedApp);
}

async function runAnalysis(app) {
  const el = document.getElementById('analysis');

  // Metrics section
  const ratingScore = app.averageUserRating ? (app.averageUserRating / 5 * 100).toFixed(0) : 0;
  const reviewScore = Math.min(100, Math.log10((app.userRatingCount || 1) + 1) / 6 * 100).toFixed(0);

  const desc = app.description || '';
  const titleWords = (app.trackName || '').toLowerCase().split(/\s+/).filter(w => w.length > 2);

  el.innerHTML = `
  <div class="section">
    <div class="section-header">
      <span class="section-title">Метрики приложения</span>
      <span class="tag blue">${esc(app.trackName)}</span>
    </div>
    <div class="section-body">
      <div class="metrics-grid">
        <div class="metric-card">
          <div class="metric-label">Рейтинг</div>
          <div class="metric-value amber">${app.averageUserRating ? app.averageUserRating.toFixed(2) : '—'}</div>
          <div class="metric-sub">из 5.0</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Отзывов</div>
          <div class="metric-value blue">${app.userRatingCount ? formatNum(app.userRatingCount) : '—'}</div>
          <div class="metric-sub">${selectedCountry.toUpperCase()}</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Версия</div>
          <div class="metric-value">${app.version || '—'}</div>
          <div class="metric-sub">${app.minimumOsVersion ? 'iOS ' + app.minimumOsVersion + '+' : ''}</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Категория</div>
          <div class="metric-value" style="font-size:14px">${app.primaryGenreName || '—'}</div>
          <div class="metric-sub">${app.price === 0 ? 'Бесплатное' : app.price + ' ' + app.currency}</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Обновление</div>
          <div class="metric-value" style="font-size:14px">${app.currentVersionReleaseDate ? formatDate(app.currentVersionReleaseDate) : '—'}</div>
          <div class="metric-sub">последний раз</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Размер</div>
          <div class="metric-value accent">${app.fileSizeBytes ? (app.fileSizeBytes / 1048576).toFixed(0) + ' MB' : '—'}</div>
          <div class="metric-sub">${app.contentAdvisoryRating || ''}</div>
        </div>
      </div>

      <hr>

      <div style="margin-bottom:10px">
        <div class="metric-label" style="margin-bottom:8px">ASO-сигналы</div>
        ${scoreBar('Рейтинг', ratingScore, '#fbbf24')}
        ${scoreBar('Популярность (отзывы)', reviewScore, '#60a5fa')}
        ${scoreBar('Свежесть (дата обновл.)', freshnessScore(app.currentVersionReleaseDate), '#4ade80')}
      </div>

      <hr>

      <div style="margin-bottom:6px" class="metric-label">Ключевые слова из названия</div>
      <div class="keywords-wrap" style="margin-bottom:14px">
        ${titleWords.map(w => `<span class="kw high">${w}</span>`).join('')}
      </div>

      <div style="margin-bottom:6px" class="metric-label">Описание</div>
      <div class="desc-text" id="descText" onclick="this.classList.toggle('expanded')">${esc(desc.slice(0, 800))}${desc.length > 800 ? '...' : ''}</div>
    </div>
  </div>

  <div class="section" id="aiSection">
    <div class="section-header">
      <span class="section-title">AI-анализ ASO</span>
      <span class="dot" style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);animation:blink 1s ease-in-out infinite;"></span>
    </div>
    <div class="section-body">
      <div class="status"><span class="dot"></span>Claude анализирует описание...</div>
    </div>
  </div>
  `;

  // Now call Claude API
  await callClaudeASO(app);
}

async function callClaudeASO(app) {
  const prompt = `Ты ASO-эксперт. Проанализируй мобильное приложение из App Store и дай практические рекомендации.

ПРИЛОЖЕНИЕ:
Название: ${app.trackName}
Разработчик: ${app.artistName}
Категория: ${app.primaryGenreName}
Рейтинг: ${app.averageUserRating ? app.averageUserRating.toFixed(2) + '/5' : 'нет данных'}
Кол-во отзывов: ${app.userRatingCount ? formatNum(app.userRatingCount) : 'нет данных'}
Страна: ${selectedCountry.toUpperCase()}
Описание:
${(app.description || '').slice(0, 1200)}

Дай анализ строго в таком формате (используй эти заголовки):

**ТОП КЛЮЧЕВЫЕ СЛОВА** (из описания, 10–15 штук, самые релевантные)
[перечисли через запятую]

**ПРОПУЩЕННЫЕ КЛЮЧЕВЫЕ СЛОВА** (чего не хватает для ASO в этой категории, 5–8 штук)
[перечисли через запятую]

**ОЦЕНКА ОПИСАНИЯ** (кратко, 2–3 предложения: что хорошо, что плохо)

**РЕКОМЕНДАЦИИ** (3–5 конкретных действий для улучшения ASO)
1. ...
2. ...
3. ...

**КОНКУРЕНТЫ** (2–3 похожих приложения, которые могут быть конкурентами)
[перечисли]

Отвечай на русском. Будь конкретным и практичным.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await res.json();
    const text = data.content?.[0]?.text || 'Нет ответа';
    renderAIAnalysis(text);
  } catch (e) {
    document.querySelector('#aiSection .section-body').innerHTML =
      `<div class="status">Ошибка API: ${e.message}</div>`;
  }
}

function renderAIAnalysis(text) {
  const body = document.querySelector('#aiSection .section-body');

  // Parse sections
  const sections = {};
  const lines = text.split('\n');
  let current = null;
  let buf = [];

  lines.forEach(line => {
    const m = line.match(/\*\*(.+?)\*\*/);
    if (m) {
      if (current) sections[current] = buf.join('\n').trim();
      current = m[1].trim();
      buf = [];
    } else if (current) {
      buf.push(line);
    }
  });
  if (current) sections[current] = buf.join('\n').trim();

  // Keywords
  const topKw = sections['ТОП КЛЮЧЕВЫЕ СЛОВА'] || '';
  const missKw = sections['ПРОПУЩЕННЫЕ КЛЮЧЕВЫЕ СЛОВА'] || '';
  const evalTxt = sections['ОЦЕНКА ОПИСАНИЯ'] || '';
  const recs = sections['РЕКОМЕНДАЦИИ'] || '';
  const comps = sections['КОНКУРЕНТЫ'] || '';

  const kwTop = topKw.split(',').map(s => s.trim()).filter(Boolean);
  const kwMiss = missKw.split(',').map(s => s.trim()).filter(Boolean);

  body.innerHTML = `
    <div style="margin-bottom:16px">
      <div class="metric-label" style="margin-bottom:8px">Топ ключевые слова (из описания)</div>
      <div class="keywords-wrap">
        ${kwTop.map(k => `<span class="kw high">${esc(k)}</span>`).join('')}
      </div>
    </div>

    ${kwMiss.length ? `
    <div style="margin-bottom:16px">
      <div class="metric-label" style="margin-bottom:8px">Пропущенные ключевые слова</div>
      <div class="keywords-wrap">
        ${kwMiss.map(k => `<span class="kw mid">${esc(k)}</span>`).join('')}
      </div>
    </div>` : ''}

    <hr>

    ${evalTxt ? `
    <div style="margin-bottom:16px">
      <div class="metric-label" style="margin-bottom:6px">Оценка описания</div>
      <div class="analysis-block">${esc(evalTxt)}</div>
    </div>` : ''}

    ${recs ? `
    <div style="margin-bottom:16px">
      <div class="metric-label" style="margin-bottom:6px">Рекомендации</div>
      <div class="analysis-block">${esc(recs)}</div>
    </div>` : ''}

    ${comps ? `
    <div>
      <div class="metric-label" style="margin-bottom:6px">Конкуренты</div>
      <div class="analysis-block">${esc(comps)}</div>
    </div>` : ''}
  `;
}

// Helpers
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatNum(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(0) + 'K';
  return String(n);
}

function formatDate(s) {
  const d = new Date(s);
  return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', year: 'numeric' });
}

function renderStars(r) {
  const full = Math.floor(r);
  const half = r - full >= 0.5 ? 1 : 0;
  return '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(5 - full - half);
}

function freshnessScore(dateStr) {
  if (!dateStr) return 0;
  const days = (Date.now() - new Date(dateStr)) / 86400000;
  if (days < 30) return 100;
  if (days < 90) return 80;
  if (days < 180) return 60;
  if (days < 365) return 40;
  return 15;
}

function scoreBar(label, val, color) {
  return `
  <div class="score-row">
    <div class="score-label">${label}</div>
    <div class="score-bar-wrap">
      <div class="score-bar" style="width:${val}%;background:${color}"></div>
    </div>
    <div class="score-num">${Math.round(val)}</div>
  </div>`;
}
</script>
